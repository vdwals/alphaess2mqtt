version: '2'

services:
  alpha_ess_2_mqtt:
    container_name: alphaEss2Mqtt
    restart: always
    build:
      context: .
    image: alpha_ess_2_mqtt
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      MQTT.HOST: ${MQTT.HOST}
      MQTT.PASSWORD: ${MQTT.PASSWORD}
      #      MQTT.TOPIC: alpha_test
      #      MQTT.DISCOVERY_TOPIC: test
      #      MQTT.PROTOCOLL: mqtt
      MQTT.USERNAME: ${MQTT.USERNAME}
      MQTT.PORT: ${MQTT.PORT}
      ALPHA.USERNAME: ${ALPHA.USERNAME}
      ALPHA.PASSWORD: ${ALPHA.PASSWORD}
